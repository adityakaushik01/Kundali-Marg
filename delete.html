<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
<div class="max-w-md mx-auto border-2 border-amber-500 mt-10 aspect-square relative bg-white">
  <!-- Traditional North Indian Kundali layout with corrected house positions -->
  <div class="absolute inset-0">
    <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
      <!-- Outer square -->
      <rect x="0" y="0" width="100" height="100" fill="none" stroke="#f59e0b" stroke-width="1" />

      <!-- Diagonal lines -->
      <line x1="0" y1="0" x2="100" y2="100" stroke="#f59e0b" stroke-width="1" />
      <line x1="100" y1="0" x2="0" y2="100" stroke="#f59e0b" stroke-width="1" />

      <!-- Midpoint connectors -->
      <line x1="50" y1="0" x2="0" y2="50" stroke="#f59e0b" stroke-width="1" />
      <line x1="0" y1="50" x2="50" y2="100" stroke="#f59e0b" stroke-width="1" />
      <line x1="50" y1="100" x2="100" y2="50" stroke="#f59e0b" stroke-width="1" />
      <line x1="100" y1="50" x2="50" y2="0" stroke="#f59e0b" stroke-width="1" />
    </svg>
  </div>

  <!-- House Numbers according to Traditional North Indian Chart -->
  <div class="absolute inset-0 text-black text-xs font-semibold">
    <div class="absolute top-[5%] left-[48%]">1</div>
    <div class="absolute top-[20%] left-[20%]">2</div>
    <div class="absolute top-[5%] left-[5%]">3</div>
    <div class="absolute left-[20%] top-[20%]">4</div>
    <div class="absolute bottom-[5%] left-[5%]">5</div>
    <div class="absolute bottom-[20%] left-[20%]">6</div>
    <div class="absolute bottom-[5%] left-[48%]">7</div>
    <div class="absolute bottom-[20%] right-[20%]">8</div>
    <div class="absolute bottom-[5%] right-[5%]">9</div>
    <div class="absolute right-[20%] top-[20%]">10</div>
    <div class="absolute top-[5%] right-[5%]">11</div>
    <div class="absolute top-[20%] right-[20%]">12</div>
  </div>
</div>

</body>
</html>
